<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Vista-community</title>
    <link rel="icon" type="image/x-icon" href="logo.jpeg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --overlay: rgba(0, 0, 0, 0.7);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #ffffff;
                --bg-secondary: #f5f5f5;
                --text-primary: #0a0a0a;
                --text-secondary: #525252;
                --overlay: rgba(255, 255, 255, 0.7);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* AGE GATE STYLES */
        .age-gate {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            /* AGE VERIFICATION WALLPAPER: Add image URL here */
            background-image: url('logo.jpeg');
            background-size: cover;
            background-position: center;
            animation: fadeIn 0.6s ease;
        }

        .age-gate::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }

        .age-gate-content {
            position: relative;
            background: var(--bg-secondary);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease 0.2s both;
        }

        .age-gate h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .age-gate p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .age-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 0.9rem 2.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-yes {
            background: var(--accent);
            color: white;
        }

        .btn-yes:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-no {
            background: transparent;
            color: var(--text-secondary);
            border: 2px solid var(--text-secondary);
        }

        .btn-no:hover {
            background: var(--text-secondary);
            color: var(--bg-primary);
        }

        /* MAIN CONTENT */
        .main-content {
            display: none;
            min-height: 100vh;
            position: relative;
            animation: fadeIn 0.8s ease;
        }

        .main-content.active {
            display: block;
        }

        .main-content::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            /* HOME PAGE WALLPAPER: Add image URL here, will be blurred */
            background-image: url('wall.jpeg');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.3);
            transform: scale(1.1);
        }

        header {
            padding: 2rem 5%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: slideDown 0.8s ease;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            animation: slideDown 0.8s ease 0.1s both;
        }

        /* PHOTO GRID */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 3rem 5%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .photo-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 3/4;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            animation: fadeInUp 0.8s ease both;
        }

        .photo-card:nth-child(1) { animation-delay: 0.2s; }
        .photo-card:nth-child(2) { animation-delay: 0.4s; }
        .photo-card:nth-child(3) { animation-delay: 0.6s; }

        .photo-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.4);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .photo-card:hover img {
            transform: scale(1.1);
        }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 60%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .photo-card:hover .photo-overlay {
            opacity: 1;
        }

        .photo-button {
            background: var(--accent);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transform: translateY(20px);
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
        }

        .photo-card:hover .photo-button {
            transform: translateY(0);
        }

        .photo-button:hover {
            background: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.6);
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .age-gate-content {
                padding: 2rem 1.5rem;
            }

            .age-gate h1 {
                font-size: 1.5rem;
            }

            .age-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .photo-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding: 2rem 5%;
            }

            header {
                padding: 1.5rem 5%;
            }
        }
    </style>
</head>
<body>
    <!-- AGE VERIFICATION GATE -->
    <div class="age-gate" id="ageGate">
        <div class="age-gate-content">
            <h1>Age Verification</h1>
            <p>This website contains content intended for mature audiences. Are you 18 years or older?</p>
            <div class="age-buttons">
                <button class="btn btn-yes" onclick="verifyAge(true)">Yes, I'm 18+</button>
                <button class="btn btn-no" onclick="verifyAge(false)">No, I'm under 18</button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">
        <header>
            <h1>Otaku Vista-community</h1>
            <p>Welcome to the community</p>
        </header>

        <div class="photo-grid">
            <!-- PHOTO 1: LINK EKATA MEKA WENAS KARAPANNA -->
            <div class="photo-card">
                <img src="animenew.png" alt="Gallery 1">
                <div class="photo-overlay">
                    <a href="https://come.ac/animewall" class="photo-button" target="_blank">Go to site</a>
                </div>
            </div>

            <!-- PHOTO 2: LINK EKATA MEKA WENAS KARAPANNA -->
            <div class="photo-card">
                <img src="midnight.jpeg" alt="Gallery 2">
                <div class="photo-overlay">
                    <a href="https://come.ac/midnight" class="photo-button" target="_blank">Go to site</a>
                </div>
            </div>

            <!-- PHOTO 3: LINK EKATA MEKA WENAS KARAPANNA -->
            <div class="photo-card">
                <img src="boobsnew.png" alt="Gallery 3">
                <div class="photo-overlay">
                    <a href="https://m1i2d8n7i7g5h0t.github.io/boobslens01/" class="photo-button" target="_blank">Go to site</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function verifyAge(isAdult) {
            if (isAdult) {
                document.getElementById('ageGate').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
                // Save to sessionStorage so it doesn't ask again on refresh
                sessionStorage.setItem('ageVerified', 'true');
            } else {
                window.location.href = 'https://www.google.com';
            }
        }

        // Check if already verified this session
        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('ageVerified') === 'true') {
                document.getElementById('ageGate').style.display = 'none';
                document.getElementById('mainContent').classList.add('active');
            }
        });
    </script>
</body>
</html>
